<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Pipeline Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
            padding:40px;
            max-width:900px;
        }

        .badge{
            display:inline-block;
            background:#22c55e;
            color:#fff;
            padding:10px 20px;
            border-radius:30px;
            margin-bottom:20px;
            font-weight:bold;
            box-shadow:0 0 15px rgba(34,197,94,0.5);
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:1.2rem;
            color:#cbd5e1;
            margin-bottom:40px;
        }

        .pipeline{
            display:flex;
            justify-content:center;
            align-items:center;
            flex-wrap:wrap;
            gap:15px;
        }

        .step{
            background:#1e293b;
            padding:20px;
            width:140px;
            border-radius:12px;
            border:1px solid #334155;
            transition:0.3s;
        }

        .step:hover{
            transform:translateY(-8px);
            box-shadow:0 0 20px rgba(56,189,248,0.4);
        }

        .icon{
            font-size:2rem;
            margin-bottom:10px;
        }

        .arrow{
            font-size:2rem;
            color:#38bdf8;
        }

        .footer{
            margin-top:50px;
            color:#94a3b8;
            font-size:1rem;
        }

        .success{
            margin-top:25px;
            color:#22c55e;
            font-size:1.3rem;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="badge">
        🚀 Deployment Successful
    </div>

    <h1>CI/CD Pipeline Demo</h1>

    <p>
        Automated deployment using GitHub, Jenkins, Docker & Kubernetes
    </p>

    <div class="pipeline">

        <div class="step">
            <div class="icon">📂</div>
            <h3>GitHub</h3>
        </div>

        <div class="arrow">➜</div>

        <div class="step">
            <div class="icon">⚙️</div>
            <h3>Jenkins</h3>
        </div>

        <div class="arrow">➜</div>

        <div class="step">
            <div class="icon">🐳</div>
            <h3>Docker</h3>
        </div>

        <div class="arrow">➜</div>

        <div class="step">
            <div class="icon">☸️</div>
            <h3>Kubernetes</h3>
        </div>

    </div>

    <div class="success">
        ✅ Application Deployed Successfully via Poll SCM Trigger
    </div>

    <div class="footer">
        Build Number: <span id="build"></span><br>
        Developed by Aditya Kulkarni
    </div>

</div>

<script>
    document.getElementById("build").innerHTML =
    "Build #" + Math.floor(Math.random()*1000);
</script>

</body>
</html>
